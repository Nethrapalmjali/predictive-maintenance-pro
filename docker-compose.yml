version: '3.8'

services:
  backend:
    build: ./backend
    container_name: predictive-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./maintenance.db
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - ./backend:/app
      - backend_db:/app/data

  frontend:
    build: ./frontend
    container_name: predictive-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  backend_db:
